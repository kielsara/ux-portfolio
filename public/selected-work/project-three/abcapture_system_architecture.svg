<!--
  Three right-side chips, each h=58, gap=12 between them:
    Whisper:    y=52,  center=81
    LLaMA:      y=122, center=151
    PostgreSQL: y=192, center=221

  Server must span from above Whisper center to below PostgreSQL center:
    top = 81 - half_server_height, bottom = 221 + half_server_height
    server y=52, h=228-52... let's just set server y=52, h=198 so it goes y=52 to y=250
    server center y = 52 + 198/2 = 151  (aligns with LLaMA center, looks natural)

  Client centered at server center y=151: client y=101, h=100
-->

